name: witness
# Re-run the wasi witnesses on every change to the trunk: the wasm-EH C++
# toolchain claim (build-order step 0), the frame pump over the lua-wasi
# source drop (step 2, incl. drop provenance at its PIN), the LÖVE core
# boot (step 3), and love.graphics on the reused opengl backend reseamed to
# WebGL2 (step 4) must never silently rot. Every artifact also passes the
# standardized-EH encoding gate. Durability target per AGENTS.md:
# CI-enforced.
on:
  push:
    branches: [wasi]
  pull_request:
    branches: [wasi]

jobs:
  eh-witness:
    runs-on: ubuntu-24.04
    # SpiderMonkey (Firefox) is the sole non-V8 cross-check now, so it must never
    # silently vanish (e.g. a Playwright version skew): WITNESS_REQUIRE_FIREFOX
    # makes legs.sh treat a missing firefox as a hard failure, not a skip.
    env:
      WITNESS_REQUIRE_FIREFOX: '1'
    steps:
      - uses: actions/checkout@v4

      - name: toolchain (clang-20 + wasm32-wasi sysroot)
        run: |
          # deb-src enables the build script's apt-get source fallback when
          # anonymous GitHub release downloads are rate-limited on runners.
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo sed -i 's/^# deb-src/deb-src/' /etc/apt/sources.list 2>/dev/null || true
          echo "deb-src state:"; grep -rs '^deb-src\|^Types:.*deb-src' /etc/apt/sources.list /etc/apt/sources.list.d/ | head -4 || echo "  (none enabled)"
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-20 lld-20 llvm-20 libclang-rt-20-dev-wasm32 wasi-libc cmake ninja-build

      - name: cache wasm-EH libc++ sysroot
        id: sysroot
        uses: actions/cache@v4
        with:
          path: wasi-eh
          key: wasi-eh-llvm20.1.2-${{ hashFiles('wasi/toolchain/build-libcxx-eh.sh', 'wasi/toolchain/Platform/**', 'wasi/toolchain/eh-flags.sh', 'wasi/toolchain/setjmp/**') }}

      - name: build libc++ / libc++abi with wasm-EH
        if: steps.sysroot.outputs.cache-hit != 'true'
        run: WORK="$RUNNER_TEMP/llvm-eh" PREFIX="$PWD/wasi-eh" wasi/toolchain/build-libcxx-eh.sh

      - uses: actions/setup-node@v4
        with:
          # 24.15 is the first 24.x to take the standardized exnref encoding
          # by default; the floor is non-monotone per line (lua-wasi #27).
          node-version: '>=24.15 <25'

      - name: chromium + firefox (V8 + SpiderMonkey non-V8 cross-check)
        # legs.sh runs the Firefox leg beside Chromium: SpiderMonkey agreeing with
        # V8 on the standardized wasm-EH encoding is the independent cross-check
        # (issue #5), with no runtime beyond Playwright — already the browser host,
        # so the whole witness path is Node-only (no pypi, no standalone binary).
        run: npm i --no-save playwright@1.61.1 && npx playwright install --with-deps chromium firefox

      - name: EH + SjLj witnesses (node:wasi + real Chromium + Firefox/SpiderMonkey)
        run: PREFIX="$PWD/wasi-eh" wasi/witness/run.sh

      - name: FreeType vendor witness (rasterize a glyph in wasm)
        # Builds vendored FreeType and renders glyph 'A' from Vera.ttf under all
        # three engines — exercises the SjLj rasterizer path end to end.
        run: PREFIX="$PWD/wasi-eh" wasi/vendor/freetype/run.sh

      - name: HarfBuzz vendor witness (shape text in wasm)
        # Builds vendored HarfBuzz (+FreeType) and shapes "Hello" via hb-ft under
        # all three engines.
        run: PREFIX="$PWD/wasi-eh" wasi/vendor/harfbuzz/run.sh

      - name: libogg vendor witness (framing round-trip in wasm)
        # Plain C, no sysroot needed; round-trips an Ogg packet under all three
        # engines. First of the audio trio (ogg -> vorbis -> modplug).
        run: wasi/vendor/libogg/run.sh

      - name: libvorbis vendor witness (decode Ogg Vorbis in wasm)
        # Decodes LÖVE's bundled tone.ogg to PCM via vorbisfile under all three
        # engines. Second of the audio trio.
        run: wasi/vendor/libvorbis/run.sh

      - name: libmodplug vendor witness (decode tracker music in wasm)
        # Synthesizes a minimal MOD and decodes it via the libmodplug C API
        # under all three engines. Last of the audio trio; completes vendoring.
        run: PREFIX="$PWD/wasi-eh" wasi/vendor/libmodplug/run.sh

  pump-witness:
    # Build-order step 2: the frame pump over the lua-wasi source drop,
    # external EH, driven by requestAnimationFrame in real Chromium.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: source-drop provenance (verbatim at the PIN commit)
        run: |
          commit=$(awk '/^commit:/{print $2}' wasi/lua/upstream/PIN)
          echo "PIN: $commit"
          git init "$RUNNER_TEMP/lua-wasi" -q
          git -C "$RUNNER_TEMP/lua-wasi" remote add origin https://github.com/Lua2D/lua-wasi
          git -C "$RUNNER_TEMP/lua-wasi" fetch -q --depth 1 origin "$commit"
          git -C "$RUNNER_TEMP/lua-wasi" checkout -q FETCH_HEAD
          diff -r "$RUNNER_TEMP/lua-wasi/src" wasi/lua/upstream/src
          echo "source drop is verbatim lua-wasi src/ at the pinned commit"

      - name: toolchain (clang-20 + wasm32-wasi sysroot)
        run: |
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo sed -i 's/^# deb-src/deb-src/' /etc/apt/sources.list 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-20 lld-20 llvm-20 libclang-rt-20-dev-wasm32 wasi-libc cmake ninja-build

      - name: cache wasm-EH libc++ sysroot
        id: sysroot
        uses: actions/cache@v4
        with:
          path: wasi-eh
          key: wasi-eh-llvm20.1.2-${{ hashFiles('wasi/toolchain/build-libcxx-eh.sh', 'wasi/toolchain/Platform/**', 'wasi/toolchain/eh-flags.sh', 'wasi/toolchain/setjmp/**') }}

      - name: build libc++ / libc++abi with wasm-EH
        if: steps.sysroot.outputs.cache-hit != 'true'
        run: WORK="$RUNNER_TEMP/llvm-eh" PREFIX="$PWD/wasi-eh" wasi/toolchain/build-libcxx-eh.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '>=24.15 <25'

      - name: chromium + firefox + webkit (cross-engine media probe, #33)
        # chromium + firefox are required (the pump/boot/audio witnesses use
        # chromium; firefox is the #33 non-V8 audio cross-check). webkit is
        # best-effort — if it won't install on the runner, the #33 probe skips it
        # (records "not installed") rather than failing the job.
        run: |
          npm i --no-save playwright@1.61.1
          npx playwright install --with-deps chromium firefox
          npx playwright install --with-deps webkit || echo "::warning::webkit install failed; #33 probe will skip WebKit"

      - name: pump witness (node + real Chromium, rAF-driven)
        run: PREFIX="$PWD/wasi-eh" wasi/pump/run.sh

      - name: boot witness (LÖVE core under the pump, node + real Chromium)
        run: PREFIX="$PWD/wasi-eh" wasi/boot/run.sh

      - name: platform witness — love_fs VFS seam, read round-trip (step 6.1, node + real Chromium)
        # Build-order step 6, sub-step 6.1: the host<->wasm file-bytes plumbing
        # (love_fs.fs_size/fs_read) isolated before the real love.filesystem
        # module rides on it — a binary asset with embedded NULs recovered
        # byte-exact through the seam under both node:wasi and Chromium.
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run.sh

      - name: platform witness — real love.filesystem on the seam (step 6.2, node + real Chromium)
        # Build-order step 6, sub-step 6.2: the real love.filesystem module
        # (D1=A, replacing PhysFS) on the love_fs seam — require("love.filesystem")
        # now succeeds (the step-3 stop-line is gone) and read/getInfo/openFile/
        # load/require recover host-provided files byte-exact through the real
        # module. Keeps 6.1 (raw seam) as the isolated diagnostic, as graphics
        # keeps 4.1a raw-GL beside the real backend.
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run-fs2.sh

      - name: platform witness — real love.event/keyboard/mouse on the love_input seam (step 6.4, node + real Chromium)
        # Build-order step 6.4: the first host->guest PUSH seam. The host queues
        # DOM events; love.event::wasm::Event::pump() drains them into
        # love::event::Message objects (the job event/sdl/Event.cpp::convert does
        # for SDL) and updates the shared input snapshot love.keyboard/mouse read.
        # The witness asserts the full translated message sequence (key/text/mouse/
        # wheel/resize/quit, incl. the DOM->LÖVE button remap) AND the resulting
        # isDown/getPosition state. Windowless, so it runs on node + Chromium both.
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run-input.sh

      - name: platform witness — real love.joystick/gamepad on the love_gamepad seam (step 6.5, node + real Chromium)
        # Build-order step 6.5: the real love.joystick/love.gamepad over the browser
        # Gamepad API on the love_gamepad seam. Unlike 6.4's push queue, the Gamepad
        # API is POLL-based: love.event's pump() calls a gamepad poll (a weak hook,
        # null in the 6.4 build) that reads navigator.getGamepads()-shaped records
        # ONCE per frame and DIFFS them against the previous poll to synthesize the
        # joystickadded/removed, joystick(pressed/released/axis) and
        # gamepad(pressed/released/axis) events SDL would push — reusing 6.4's push
        # mechanism. The witness advances three scripted frames (connect+press,
        # release+press, disconnect) and asserts the synthesized events + the
        # love.joystick reader state (isGamepad/isGamepadDown/getGamepadAxis/getName).
        # W3C-standard <-> LÖVE mapping in C++; vibration/mapping-string/gamepad
        # sensors are honest warn-once edges. Windowless: node + Chromium both.
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run-joystick.sh

      - name: preview-limitation warning witness — love.sensor warned stub (issue #27, node + real Chromium)
        # Issue #27's mechanism: preview_warn_once emits a one-time
        # [love-wasi preview] notice to the host tap when a preview-limited
        # feature is used, non-fatally, returning a safe default. The love.sensor
        # warned stub is the witnessed example (motion sensors -> zeros); the
        # witness asserts non-fatal + safe-default + the one-time dedup (count 1
        # after two calls). Keeping love.sensor enabled also moots upstream #23.
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run-sensor.sh

      - name: platform witness — real love.timer/love.system (step 6.6a, node + real Chromium)
        # Build-order step 6.6a: love.timer (a concrete class — Timer.cpp routes
        # through clock_gettime(CLOCK_MONOTONIC)/gettimeofday under the LOVE_WASI arm
        # of its POSIX guard; love::sleep is the honest browser no-op) + love.system
        # (the wasm backend on the love_system seam for the genuine browser
        # capabilities — processor count, clipboard, openURL, locales; getOS "Web"
        # via the guarded seam). The witness asserts getTime advances, step() dt,
        # getOS "Web", processor count, the clipboard round-trip and the locale
        # shape. Windowless, so it runs on node + Chromium both.
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run-timer-system.sh

      - name: platform witness — the embedding contract (step 6.7, node + real Chromium)
        # Build-order step 6.7 — THE CAPSTONE (Step 6 complete). What makes the
        # runtime consumable by a live-edit host: (1) the real love.filesystem
        # WRITE path — write/append/remove/createDirectory/File:open("w"/"a") and
        # the save dir over three new love_fs write imports (fs_write/fs_remove/
        # fs_mkdir), all in the out-of-tree fs-backend.cpp + host, no new src/ seam;
        # the host holds a SEPARATE writable save namespace beside the read-only
        # project, reads resolve save-first (physfs mount order), so a written file
        # shadows a project file and removing the save copy reveals the pristine
        # project beneath — the witness proves, by transcript alone, that writes
        # never mutate the project (NUL-safe). (2) the reload/invalidate primitive
        # (D5=A: whole-chunk re-eval) — a host-callable pump_invalidate() that drops
        # game Lua modules from package.loaded (love.* + std libs preserved); the
        # reload invariant witnessed: require("mod").v==1 -> host-edit via the write
        # path -> pump_invalidate() -> require("mod").v==2 = live-edit. Windowless,
        # so it runs on node + Chromium both.
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run-embed.sh

      - name: audio witness (love.audio playback + mic, node + Chromium + fake-device capture)
        run: PREFIX="$PWD/wasi-eh" wasi/audio/run.sh

      - name: resample-delegation probe — Chromium + Firefox + WebKit (issue #33)
        # A PROBE, not a gate (exits 0 regardless): records per-engine whether a
        # requested capture rate is honored and whether createMediaStreamSource
        # survives a rate mismatch. The step-5 backend is already correct on all
        # three via its runtime capability check; this only records fidelity, so
        # its findings land in the CI log rather than passing/failing the job.
        run: node wasi/audio/probe-resample-xengine.mjs

  graphics-witness:
    # Build-order step 4: love.graphics on the reused opengl backend, reseamed to
    # WebGL2 static imports. One wasm build drives every leg — clear, the first
    # positioned draw, the full 2D primitive set, textures, user shaders, canvases,
    # text, blend/scissor/stencil, the higher-level drawables (mesh, spritebatch,
    # particles), the compose-only API tail (transforms, MRT, MSAA, engine
    # readback, GraphicsBuffer), and the WebGL2 ceiling witnessed as a graceful
    # divergence — all recovered by pixel-readback in real Chromium (4.1a also on
    # node). Same wasm-EH sysroot as the other jobs (shared cache key).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: toolchain (clang-20 + wasm32-wasi sysroot)
        run: |
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo sed -i 's/^# deb-src/deb-src/' /etc/apt/sources.list 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-20 lld-20 llvm-20 libclang-rt-20-dev-wasm32 wasi-libc cmake ninja-build

      - name: cache wasm-EH libc++ sysroot
        id: sysroot
        uses: actions/cache@v4
        with:
          path: wasi-eh
          key: wasi-eh-llvm20.1.2-${{ hashFiles('wasi/toolchain/build-libcxx-eh.sh', 'wasi/toolchain/Platform/**', 'wasi/toolchain/eh-flags.sh', 'wasi/toolchain/setjmp/**') }}

      - name: build libc++ / libc++abi with wasm-EH
        if: steps.sysroot.outputs.cache-hit != 'true'
        run: WORK="$RUNNER_TEMP/llvm-eh" PREFIX="$PWD/wasi-eh" wasi/toolchain/build-libcxx-eh.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '>=24.15 <25'

      - name: chromium
        run: npm i --no-save playwright@1.61.1 && npx playwright install --with-deps chromium

      - name: graphics witness (love.graphics on real WebGL2, node + real Chromium)
        # build.sh bootstraps vendored FreeType + HarfBuzz into gfxlibs on first
        # run; glslang, glad and zlib compile from in-tree source. run.sh then
        # drives 4.1a (raw-GL, node + Chromium) and 4.1c..4.20 (real backend,
        # Chromium) off one wasm build.
        run: PREFIX="$PWD/wasi-eh" wasi/graphics/run.sh

      - name: window witness — real love.window + captureScreenshot (step 6.3 + step-4 close, real Chromium)
        # Build-order step 6.3: love.window.setMode drives the host to create the
        # real canvas + WebGL2 context (love_win seam), retiring the fake setMode
        # graphics-ext plays; present() then runs for real, which also lands step
        # 4's last item — captureScreenshot reads the presented backbuffer back
        # (drawn + clear pixels recovered exactly). Reuses the graphics job's warm
        # gfxlibs. Chromium-only (real WebGL2).
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run-win.sh

      - name: first full main.lua frame — conf -> canvas -> load -> draw -> present (step 6.6b, real Chromium)
        # Build-order step 6.6b — THE MILESTONE. The union artifact (real
        # filesystem + window + graphics/WebGL2 + image + font + event/keyboard/
        # mouse + timer + system) boots LÖVE's real boot.lua and runs the canned
        # game (fs-host's conf.lua + main.lua) to a drawn pixel: conf sizes/titles
        # the canvas, love.window.setMode opens the WebGL2 context, love.load prints
        # a unique marker to the host tap, love.run's loop runs update/draw/present
        # once per pumped frame, and love.draw fills the canvas RED. The driver
        # asserts the marker reached fd 1 AND the presented backbuffer centre pixel
        # is RED (read back through the WebGL2 context). Reuses the graphics job's
        # warm gfxlibs. Chromium-only (real WebGL2); no node leg (expected).
        run: PREFIX="$PWD/wasi-eh" wasi/platform/run-frame.sh
